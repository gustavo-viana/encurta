name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: encurta_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d encurta_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/encurta_test
      JWT_SECRET: test-secret
      DEFAULT_URL: http://localhost:3333

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Create test environment file
        run: |
          {
            echo "NODE_ENV=test"
            echo "DATABASE_URL=${DATABASE_URL}"
            echo "JWT_SECRET=${JWT_SECRET}"
            echo "DEFAULT_URL=${DEFAULT_URL}"
          } > .env.test

      - name: Run unit tests
        run: npm test

      - name: Run e2e tests
        run: npm run test:e2e
